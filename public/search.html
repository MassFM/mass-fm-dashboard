<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pencarian Islam — Radio Mass FM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      min-height: 100vh;
    }

    .search-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 12px;
    }

    .search-header {
      text-align: center;
      padding: 12px 0 8px;
    }

    .search-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #822a6e;
      margin-bottom: 4px;
    }

    .search-header p {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }

    /* Google CSE overrides for mobile-friendly look */
    .gsc-control-cse {
      padding: 0 !important;
      border: none !important;
      background: transparent !important;
    }

    .gsc-search-box {
      margin-bottom: 12px !important;
    }

    .gsc-input-box {
      border-radius: 12px !important;
      border: 2px solid #e2e8f0 !important;
      padding: 4px 8px !important;
    }

    .gsc-input-box:focus-within {
      border-color: #822a6e !important;
    }

    .gsc-search-button-v2 {
      border-radius: 12px !important;
      background: #822a6e !important;
      border: none !important;
      padding: 10px 16px !important;
    }

    .gsc-results .gsc-cursor-box {
      text-align: center;
    }

    .gsc-results .gsc-cursor-page {
      color: #822a6e !important;
    }

    .gs-title a {
      color: #822a6e !important;
    }

    .gsc-above-wrapper-area {
      border: none !important;
      padding: 0 !important;
    }
  </style>
</head>
<body>
  <div class="search-container">
    <div class="search-header">
      <h1>🔍 Pencarian Islam</h1>
      <p>Cari materi dari situs-situs Ahlussunnah terpercaya</p>
    </div>
    <div class="gcse-search"></div>
  </div>

  <script async src="https://cse.google.com/cse.js?cx=b63c610609dfc4e23"></script>
</body>
</html>
